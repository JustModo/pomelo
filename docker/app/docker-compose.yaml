services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - /opt/pomelo/data/database/mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI}
      - PORT=8080
      - AUTH_SECRET=${AUTH_SECRET}
      - JUDGE0_URL=${JUDGE0_URL}
      - DOMAIN=${DOMAIN}
      - PROTOCOL=${PROTOCOL:-http}
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - /opt/pomelo/data:/app/data
      - /opt/pomelo/config:/app/config:ro

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    environment:
      - NODE_ENV=production
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=true
      - DOMAIN=${DOMAIN}
      - PROTOCOL=${PROTOCOL:-http}
    depends_on:
      server:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - PROTOCOL=${PROTOCOL:-http}
    volumes:
      - /opt/pomelo/config/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/pomelo/runtime/logs:/var/log/caddy
    depends_on:
      - client
      - server
    entrypoint: >
      sh -c "
        if [ \"$$PROTOCOL\" = 'both' ]; then
          export CADDY_SITE_ADDRESS=\"http://$$DOMAIN, https://$$DOMAIN\"
          export CADDY_AUTO_HTTPS=\"on\"
        elif [ \"$$PROTOCOL\" = 'https' ]; then
          export CADDY_SITE_ADDRESS=\"https://$$DOMAIN\"
          export CADDY_AUTO_HTTPS=\"on\"
        else
          export CADDY_SITE_ADDRESS=\"http://$$DOMAIN:80\"
          export CADDY_AUTO_HTTPS=\"off\"
        fi
        exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
      "
