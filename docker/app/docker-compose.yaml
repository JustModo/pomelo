services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - /opt/pomelo/data/database/mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI}
      - PORT=${PORT}
      - AUTH_SECRET=${AUTH_SECRET}
      - JUDGE0_URL=${JUDGE0_URL}
      - NEXT_PUBLIC_CLIENT_URL=${NEXT_PUBLIC_CLIENT_URL}
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - /opt/pomelo/data:/app/data
      - /opt/pomelo/config:/app/config:ro

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL}
      - NEXT_PUBLIC_CLIENT_URL=${NEXT_PUBLIC_CLIENT_URL}
      - AUTH_SECRET=${AUTH_SECRET}
    depends_on:
      server:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - /opt/pomelo/config/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/pomelo/runtime/logs:/var/log/caddy
    depends_on:
      - client
      - server
