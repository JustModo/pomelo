services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  server:
    build:
      context: .
      dockerfile: server/Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - PORT=${PORT}
      - AUTH_SECRET=${AUTH_SECRET}
      - JUDGE0_URL=${JUDGE0_URL}
      - DOMAIN=${DOMAIN:-localhost:3000}
      - PROTOCOL=${PROTOCOL:-http}
    depends_on:
      mongo:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./server
          target: /app/server
          ignore:
            - server/node_modules

  client:
    build:
      context: .
      dockerfile: client/Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=${BACKEND_URL}
      - DOMAIN=${DOMAIN:-localhost:3000}
      - PROTOCOL=${PROTOCOL:-http}
      - AUTH_SECRET=${AUTH_SECRET}
    develop:
      watch:
        - action: sync
          path: ./client
          target: /app/client
          ignore:
            - client/node_modules
            - client/.next

  seed:
    build:
      context: .
      dockerfile: server/Dockerfile.dev
    command: node scripts/seed.js
    environment:
      - MONGODB_URI=mongodb://mongo:27017/pomelo
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo-data:
